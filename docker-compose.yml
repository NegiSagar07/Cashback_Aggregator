services:
  db:
    image: postgres:15
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d
    env_file:
      - .env  # Docker reads the same .env file

  db_test_init:
    image: postgres:15
    env_file:
      - .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - db
    command: >
      sh -c "
      until pg_isready -h db -p 5432 -U $$POSTGRES_USER; do sleep 1; done;
      psql -h db -U $$POSTGRES_USER -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='test_db'\" | grep -q 1
      || psql -h db -U $$POSTGRES_USER -d postgres -c \"CREATE DATABASE test_db\""
    restart: "no"

  redis:
    image: redis:7-alpine

  web:
    build: .
    command: >
      sh -c "python -m alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    env_file:
      - .env  # App reads the same .env file
    depends_on:
      - db
      - db_test_init
      - redis

  celery_worker:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./app:/code/app
    env_file:
      - .env
    depends_on:
      - db
      - db_test_init
      - redis

  celery_beat:
    build: .
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./app:/code/app
    env_file:
      - .env
    depends_on:
      - db
      - db_test_init
      - redis

volumes:
  postgres_data: